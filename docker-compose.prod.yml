services:
  app:
    build: .
    container_name: rest-api-prod
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
      - DB_SSLMODE=require
      - GIN_MODE=release
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
